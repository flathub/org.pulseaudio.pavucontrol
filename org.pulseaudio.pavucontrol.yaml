app-id: org.pulseaudio.pavucontrol
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: pavucontrol
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --env=PULSE_PROP_media.category=Manager

modules:
  - gtkmm.json

  - name: pavucontrol
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/pulseaudio/pavucontrol.git
        tag: v6.2
      - type: patch
        path: screenshots.patch
    buildsystem: meson
    config-opts:
      - -Dlynx=disabled
    cleanup:
      - /share/doc
    sources:
