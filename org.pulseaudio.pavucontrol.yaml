app-id: org.pulseaudio.pavucontrol
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: pavucontrol
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --env=PULSE_PROP_media.category=Manager

modules:
  - gtkmm.json

  - name: pavucontrol
    buildsystem: meson
    config-opts:
      - -Dlynx=disabled
    cleanup:
      - /share/doc
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/pulseaudio/pavucontrol.git
        tag: v6.2
        commit: d43ef2b5e8aaa73382ed2990354c24648f097a74
